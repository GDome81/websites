}

// === NPC ===
function svgNpc(npc) {
  const tdef = NPC_TYPES[npc.type] || NPC_TYPES.jogger;
  const color = tdef.color;
  // Animazione bob via attributo
  const bobY = npc.state === 'visiting' ? 0 : Math.sin(Date.now()/200 + (npc.id.length % 7)) * 1.5;
  return `<g transform="translate(${npc.x}, ${npc.y + bobY})">
    <ellipse cx="0" cy="2" rx="4" ry="1.5" fill="rgba(0,0,0,0.2)"/>
    <circle cx="0" cy="-6" r="3" fill="#f4d4a8"/>
    <rect x="-3" y="-3" width="6" height="6" rx="1" fill="${color}"/>
    <rect x="-3" y="2" width="2" height="3" fill="#3d2810"/>
    <rect x="1" y="2" width="2" height="3" fill="#3d2810"/>
  </g>`;
}

// === BARCA ===
function svgBoat(boat) {
  const passColors = ['#c8643c','#5fb3c4','#9bb88a','#d4a8b8','#ffe066'];
  let pax = '';
  for (let i=0;i<boat.passengers;i++) {
    const x = -10 + i*8;
    pax += `<circle cx="${x}" cy="-4" r="2.5" fill="${passColors[i%passColors.length]}"/>`;
  }
  return `<g transform="translate(${boat.x}, ${boat.y})">
    <path d="M-22,0 L22,0 L18,8 L-18,8 Z" fill="#9e4828" stroke="#5d3825" stroke-width="1"/>
    <rect x="-2" y="-16" width="2" height="16" fill="#3d2810"/>
    <polygon points="0,-16 14,-2 0,-2" fill="#fff5e1" stroke="#a8826a" stroke-width="1"/>
    ${pax}
  </g>`;
}

// === ISOLE SATELLITE ===
function svgSatelliteShape(sat) {
  // Forma stilizzata per ciascuna satellite
  if (sat.shape === 'sun') {
    return `<g transform="translate(${sat.centerX}, ${sat.centerY})">
      <ellipse cx="0" cy="20" rx="120" ry="80" fill="#9bb88a" stroke="#5d8866" stroke-width="2"/>
      <ellipse cx="0" cy="10" rx="100" ry="60" fill="#a8c878" opacity="0.7"/>
      <ellipse cx="0" cy="40" rx="110" ry="25" fill="#e8c896" opacity="0.8"/>
    </g>`;
  }
  if (sat.shape === 'forest') {
    return `<g transform="translate(${sat.centerX}, ${sat.centerY})">
      <ellipse cx="0" cy="0" rx="130" ry="100" fill="#7d9a6e" stroke="#5d8866" stroke-width="2"/>
      <ellipse cx="-20" cy="-30" rx="80" ry="50" fill="#5d8866" opacity="0.7"/>
      <ellipse cx="30" cy="40" rx="60" ry="30" fill="#9bb88a" opacity="0.6"/>
    </g>`;
  }
  if (sat.shape === 'peak') {
    return `<g transform="translate(${sat.centerX}, ${sat.centerY})">
      <polygon points="-100,80 0,-60 100,80" fill="#b8a89c" stroke="#7d6850" stroke-width="2"/>
      <polygon points="-50,30 0,-60 50,30" fill="#e8e0d8" opacity="0.8"/>
      <polygon points="-25,-5 0,-60 25,-5" fill="#fff" opacity="0.9"/>
    </g>`;
  }
  return '';
}

function svgBridge(sat) {
  if (!sat.bridgeFrom || !sat.bridgeTo) return '';
  return `<line x1="${sat.bridgeFrom.x}" y1="${sat.bridgeFrom.y}" x2="${sat.bridgeTo.x}" y2="${sat.bridgeTo.y}"
    stroke="#7d4828" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <line x1="${sat.bridgeFrom.x}" y1="${sat.bridgeFrom.y}" x2="${sat.bridgeTo.x}" y2="${sat.bridgeTo.y}"
    stroke="#a8826a" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>`;
}

function svgSatelliteLocked(sat) {
  return `<g transform="translate(${sat.centerX}, ${sat.centerY})" opacity="0.4">
    <ellipse cx="0" cy="0" rx="80" ry="50" fill="#888" stroke="#555" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="0" y="0" text-anchor="middle" font-size="32" fill="#fff" font-family="Geist Mono">🔒</text>
    <text x="0" y="24" text-anchor="middle" font-size="14" fill="#fff" font-weight="700" font-family="Fraunces">${sat.name}</text>
  </g>`;
}

// === RENDER STATIC ===
// Renderizza tutti gli elementi "fissi" (isola, slot, edifici, decor, satelliti) — chiamato quando cambia lo stato strutturale
function renderStatic() {
  const satLayer = document.getElementById('satelliteLayer');
  const slotLayer = document.getElementById('slotLayer');
  const buildingLayer = document.getElementById('buildingLayer');
  const decorLayer = document.getElementById('decorLayer');
  const bridgeLayer = document.getElementById('bridgeLayer');

  // Satelliti
  let satHtml = '';
  for (const sId in SATELLITE_ISLANDS) {
    const sat = SATELLITE_ISLANDS[sId];
    if (state.unlockedSatellites.includes(sId)) {
      satHtml += svgSatelliteShape(sat);
    } else {
      satHtml += svgSatelliteLocked(sat);
      satHtml += `<g class="sat-hitbox" data-sat="${sId}" style="cursor:pointer">
        <ellipse cx="${sat.centerX}" cy="${sat.centerY}" rx="100" ry="60" fill="transparent"/>
      </g>`;
    }
  }
  satLayer.innerHTML = satHtml;

  // Ponti (solo per sbloccati)
  let bridgeHtml = '';
  for (const sId of state.unlockedSatellites) {
    bridgeHtml += svgBridge(SATELLITE_ISLANDS[sId]);
  }
  bridgeLayer.innerHTML = bridgeHtml;

  // Slot edifici (vuoti, premium da sbloccare, in costruzione)
  let slotHtml = '';
  const allSlots = [...SLOTS_MAIN];
  for (const sId of state.unlockedSatellites) {
    allSlots.push(...SATELLITE_ISLANDS[sId].slots);
  }
  for (const s of allSlots) {
    if (state.placed[s.id]) continue;
    // Slot in costruzione (edificio in build)
    if (state.construction[s.id] && state.construction[s.id].type === 'build') {
      const c = state.construction[s.id];
      const left = Math.max(0, c.endAt - Date.now());
      const total = c.endAt - c.startAt;
      const pct = total > 0 ? (1 - left/total) * 100 : 100;
      slotHtml += `<g class="construction-site" data-slot="${s.id}" transform="translate(${s.x},${s.y})" style="cursor:pointer">
        <rect x="-18" y="-22" width="36" height="34" fill="#a8826a" stroke="#7d4828" stroke-width="2"/>
        <rect x="-16" y="-10" width="32" height="3" fill="#7d4828"/>
        <rect x="-16" y="-2" width="32" height="3" fill="#7d4828"/>
        <text y="6" text-anchor="middle" font-size="13" font-family="Geist Mono, monospace" fill="#3d2810" font-weight="700">🚧</text>
        <rect x="-22" y="18" width="44" height="6" fill="rgba(0,0,0,0.3)" rx="3"/>
        <rect x="-22" y="18" width="${Math.floor(44 * pct/100)}" height="6" fill="#ff7a1e" rx="3"/>
      </g>`;
      continue;
    }
    const z = ZONES[s.zone];
    // Slot premium chiuso?
    if (s.premium && !state.unlockedSlots.includes(s.id)) {
      const costLabel = s.unlockCost ? `💰${adjustedCoinCost(s.unlockCost)}` : `💎${s.unlockGems}`;
      slotHtml += `<g class="slot-premium" data-slot="${s.id}" transform="translate(${s.x},${s.y})" style="cursor:pointer">
        <circle r="22" fill="rgba(60,40,20,0.2)" stroke="#7d4828" stroke-width="2" stroke-dasharray="2,2"/>
        <text y="-2" text-anchor="middle" font-size="14">🔒</text>
        <text y="14" text-anchor="middle" font-size="8" font-family="Geist Mono, monospace" fill="#3d2810" font-weight="700">${costLabel}</text>
      </g>`;
    } else {
      slotHtml += `<g class="slot-empty" data-slot="${s.id}" data-zone="${s.zone}" transform="translate(${s.x},${s.y})" style="cursor:pointer">
        <circle r="22" fill="${z.color}" opacity="0.25" stroke="${z.color}" stroke-width="2" stroke-dasharray="4,3"/>
        <text y="4" text-anchor="middle" font-size="14">${z.icon}</text>
      </g>`;
    }
  }
  slotLayer.innerHTML = slotHtml;

  // Edifici piazzati
  let bHtml = '';
  for (const slotId in state.placed) {
    const b = state.placed[slotId];
    const slot = findSlotById(slotId);
    if (!slot) continue;
    // Indicatore upgrade in corso?
    const upKey = slotId;
    const upgrading = state.construction[upKey] && state.construction[upKey].type === 'upgrade';
    let progressBar = '';
    if (upgrading) {
      const c = state.construction[upKey];
      const left = Math.max(0, c.endAt - Date.now());
      const total = c.endAt - c.startAt;
      const pct = total > 0 ? (1 - left/total) * 100 : 100;
      progressBar = `<rect x="-22" y="20" width="44" height="6" fill="rgba(0,0,0,0.3)" rx="3"/>
        <rect x="-22" y="20" width="${Math.floor(44 * pct/100)}" height="6" fill="#7ab5c4" rx="3"/>
        <text y="35" text-anchor="middle" font-size="9" font-family="Geist Mono, monospace" fill="#1e4d5c" font-weight="700">↑Lv${c.targetLevel}</text>`;
    }
    bHtml += `<g class="building-placed" data-slot="${slotId}" transform="translate(${slot.x},${slot.y})" style="cursor:pointer">
      ${svgBuilding({...b, slotId}, true)}
      ${progressBar}
    </g>`;
  }
  buildingLayer.innerHTML = bHtml;

  // Decorazioni libere (array)
  let dHtml = '';
  if (Array.isArray(state.decorPlaced)) {
    for (const d of state.decorPlaced) {
      dHtml += `<g class="decor-placed" data-decor-id="${d.id}" transform="translate(${d.x},${d.y})" style="cursor:pointer">
        ${svgDecoration(d.decorId)}
      </g>`;
    }
  }
  decorLayer.innerHTML = dHtml;

  // Aggancia event listener
  attachStaticListeners();
}

function attachStaticListeners() {
  // Event delegation sull'SVG root.
  const svg = document.getElementById('islandSvg');
  if (!svg) return;
  svg.onclick = (e) => {
    // === MODALITA PIAZZAMENTO DECORAZIONE LIBERA ===
    // Se l'utente sta piazzando una decorazione, qualunque click sull'isola la piazza li (se valido)
    if (placingDecorId) {
      // Convert client coords -> SVG viewBox coords
      const pt = svg.createSVGPoint();
      pt.x = e.clientX; pt.y = e.clientY;
      const matrix = svg.getScreenCTM();
      if (matrix) {
        const svgP = pt.matrixTransform(matrix.inverse());
        // Se l'utente ha cliccato su un edificio/slot, non piazzare
        let isOnGameElement = false;
        let walk = e.target;
        while (walk && walk !== svg) {
          if (walk.classList && (
            walk.classList.contains('building-placed') ||
            walk.classList.contains('slot-empty') ||
            walk.classList.contains('slot-premium') ||
            walk.classList.contains('construction-site') ||
            walk.classList.contains('sat-hitbox') ||
            walk.classList.contains('decor-placed')
          )) { isOnGameElement = true; break; }
          walk = walk.parentNode;
        }
        if (!isOnGameElement) {
          e.stopPropagation();
          placeDecorationAt(svgP.x, svgP.y);
          return;
        }
      }
    }

    // === DELEGATION NORMALE ===
    let target = e.target;
    while (target && target !== svg) {
      if (target.classList) {
        // Coin icon: raccogli SENZA aprire il dettaglio edificio
        if (target.classList.contains('coin-icon')) {
          e.stopPropagation();
          const slotId = target.dataset.collectSlot;
          const amt = collectBuildingStorage(slotId);
          if (amt > 0) {
            showToast(`+${amt} 💰`, 'good');
            // Aggiorna immediatamente l'icona
            renderCoinIcons();
            updateUI();
            saveGame();
          }
          return;
        }
        if (target.classList.contains('slot-empty')) {
          e.stopPropagation();
          openModal('buildFromSlot', {slotId: target.dataset.slot, zone: target.dataset.zone});
          return;
        }
        if (target.classList.contains('slot-premium')) {
          e.stopPropagation();
          openModal('unlockSlot', {slotId: target.dataset.slot});
          return;
        }
        if (target.classList.contains('construction-site')) {
          e.stopPropagation();
          openModal('constructionDetail', {slotId: target.dataset.slot});
          return;
        }
        if (target.classList.contains('building-placed')) {
          e.stopPropagation();
          openModal('buildingDetail', {slotId: target.dataset.slot});
          return;
        }
        if (target.classList.contains('sat-hitbox')) {
          e.stopPropagation();
          openModal('satelliteUnlock', {satId: target.dataset.sat});
          return;
        }
        if (target.classList.contains('decor-placed')) {
          e.stopPropagation();
          openModal('decorActions', {decorId: target.dataset.decorId});
          return;
        }
      }
      target = target.parentNode;
    }
  };
}

// === RENDER ENTITIES (NPC + BOAT) — chiamato ogni frame ===
function renderEntities() {
  const npcLayer = document.getElementById('npcLayer');
  const boatLayer = document.getElementById('boatLayer');
  if (!npcLayer || !boatLayer) return;

  let nHtml = '';
  for (const npc of state.npcRoster) nHtml += svgNpc(npc);
  npcLayer.innerHTML = nHtml;

  if (state.boat) {
    boatLayer.innerHTML = svgBoat(state.boat);
  } else {
    boatLayer.innerHTML = '';
  }

  // Overlay di piazzamento decorazione libera: solo un velo leggero + suggerimento testuale
  const placementLayer = document.getElementById('placementLayer');
  if (placementLayer) {
    if (placingDecorId) {
      const d = DECORATIONS[placingDecorId];
      placementLayer.innerHTML = `
        <rect x="-280" y="-220" width="1480" height="920" fill="rgba(255,224,102,0.08)" pointer-events="none"/>
        <text x="450" y="-150" text-anchor="middle" font-size="22" font-family="Fraunces, serif" fill="#9e4828" font-weight="700" pointer-events="none">

function renderCoinIcons() {
  const layer = document.getElementById('coinIconLayer');
  if (!layer) return;
  let html = '';
  for (const slotId in state.placed) {
    const b = state.placed[slotId];
    const def = BUILDINGS[b.id];
    if (!def || !def.rate) continue;
    const cap = buildingStorageCap(def, b.level || 1);
    if (cap <= 0) continue;
    const storage = b.coinStorage || 0;
    const pct = storage / cap;
    if (pct < 0.5) continue; // mostra solo se almeno a meta
    const slot = findSlotById(slotId);
    if (!slot) continue;
    const isFull = pct >= 0.999;
    const cls = isFull ? 'coin-icon full' : 'coin-icon';
    const x = slot.x + 26;
    const y = slot.y - 28;
    const amount = Math.floor(storage);
    const label = amount >= 1000 ? `${(amount/1000).toFixed(1)}K` : String(amount);
    html += `<g class="${cls}" data-collect-slot="${slotId}" transform="translate(${x},${y})" style="cursor:pointer">
      <circle r="14" fill="#f4c542" stroke="#9e6720" stroke-width="2"/>
      <text y="4" text-anchor="middle" font-size="14" font-family="Fraunces, serif" font-weight="800" fill="#5c3d10">$</text>
      <rect x="-22" y="14" width="44" height="11" rx="5" fill="rgba(0,0,0,0.65)"/>
      <text y="22" text-anchor="middle" font-size="9" font-family="Geist Mono, monospace" fill="#fff" font-weight="700">${label}</text>
    </g>`;
  }
  layer.innerHTML = html;
}

// ============================================================
// ZOOM & PAN
// ============================================================
// Il viewBox di partenza e' "-280 -220 1480 920" (vedi skeleton)
// Lo manteniamo come "world bounds" e applichiamo zoom/pan modificando il viewBox.
var ZOOM_DEFAULT_VB = { x: -280, y: -220, w: 1480, h: 920 };
var ZOOM_MIN_W = 400;     // zoom in max
var ZOOM_MAX_W = 2000;    // zoom out max
var zoomVB = Object.assign({}, ZOOM_DEFAULT_VB);

function applyZoomViewBox() {
  const svg = document.getElementById('islandSvg');
  if (!svg) return;
  svg.setAttribute('viewBox', `${zoomVB.x} ${zoomVB.y} ${zoomVB.w} ${zoomVB.h}`);
}

function clampZoomVB() {
  // Limita zoom: w in [ZOOM_MIN_W, ZOOM_MAX_W]
  if (zoomVB.w < ZOOM_MIN_W) { zoomVB.h *= ZOOM_MIN_W / zoomVB.w; zoomVB.w = ZOOM_MIN_W; }
  if (zoomVB.w > ZOOM_MAX_W) { zoomVB.h *= ZOOM_MAX_W / zoomVB.w; zoomVB.w = ZOOM_MAX_W; }
  // Limita pan: il centro del viewBox non deve uscire dal "mondo" allargato
  // Mondo allargato (per permettere di vedere i satelliti): da -400 a 1300 su X, da -300 a 800 su Y
  const worldMinX = -500, worldMaxX = 1400, worldMinY = -400, worldMaxY = 900;
  if (zoomVB.x < worldMinX) zoomVB.x = worldMinX;
  if (zoomVB.y < worldMinY) zoomVB.y = worldMinY;
  if (zoomVB.x + zoomVB.w > worldMaxX) zoomVB.x = worldMaxX - zoomVB.w;
  if (zoomVB.y + zoomVB.h > worldMaxY) zoomVB.y = worldMaxY - zoomVB.h;
}

function zoomBy(factor, anchorClientX, anchorClientY) {
  const svg = document.getElementById('islandSvg');
  if (!svg) return;
  // Converti anchor (coords client) in coords viewBox
  let anchor;
  if (anchorClientX != null && anchorClientY != null) {
    const pt = svg.createSVGPoint();
    pt.x = anchorClientX; pt.y = anchorClientY;
    const m = svg.getScreenCTM();
    if (m) anchor = pt.matrixTransform(m.inverse());
  }
  if (!anchor) {
    anchor = { x: zoomVB.x + zoomVB.w/2, y: zoomVB.y + zoomVB.h/2 };
  }
  const newW = zoomVB.w * factor;
  const newH = zoomVB.h * factor;
  // Mantieni anchor allo stesso punto sullo schermo
  zoomVB.x = anchor.x - (anchor.x - zoomVB.x) * (newW / zoomVB.w);
  zoomVB.y = anchor.y - (anchor.y - zoomVB.y) * (newH / zoomVB.h);
  zoomVB.w = newW;
  zoomVB.h = newH;
  clampZoomVB();
  applyZoomViewBox();
}

function resetZoom() {
  zoomVB = Object.assign({}, ZOOM_DEFAULT_VB);
  applyZoomViewBox();
}

// === GESTURE: pan + pinch + wheel ===
var _panState = null;       // { startClientX, startClientY, startVB }
var _pinchState = null;     // { startDist, startVB, startCenterClient }
var _activePointers = new Map(); // pointerId -> {x,y}
var _isDragging = false;

function initZoomGestures() {
  const svg = document.getElementById('islandSvg');
  if (!svg) return;

  // Wheel = zoom (desktop)
  svg.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 1.15 : 1/1.15;
    zoomBy(factor, e.clientX, e.clientY);
  }, { passive: false });

  // PointerDown
  svg.addEventListener('pointerdown', (e) => {
    // Se sta piazzando una decorazione, niente pan/pinch (passa il click)
    if (placingDecorId) return;
    // NB: NON facciamo setPointerCapture qui, altrimenti i click sui figli
    // (slot, edifici) vengono dirottati al root SVG e e.target diventa l'SVG.
    // Catturiamo solo se l'utente inizia davvero a trascinare (vedi pointermove).
    _activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (_activePointers.size === 1) {
      // Possibile inizio pan: registriamo ma non droppiamo subito il click
      _panState = {
        pointerId: e.pointerId,
        startClientX: e.clientX,
        startClientY: e.clientY,
        startVB: Object.assign({}, zoomVB),
        moved: false,
      };
    } else if (_activePointers.size === 2) {
      // Inizio pinch
      const pts = [..._activePointers.values()];
      const dx = pts[0].x - pts[1].x;
      const dy = pts[0].y - pts[1].y;
      _pinchState = {
        startDist: Math.sqrt(dx*dx + dy*dy),
        startVB: Object.assign({}, zoomVB),
        startCenterClient: { x: (pts[0].x+pts[1].x)/2, y: (pts[0].y+pts[1].y)/2 },
      };
      _panState = null; // annulla pan con due dita
      // Con due dita ora catturiamo: e' un pinch certo
      try { svg.setPointerCapture(e.pointerId); } catch(_) {}
    }
  });

  // PointerMove
  svg.addEventListener('pointermove', (e) => {
    if (!_activePointers.has(e.pointerId)) return;
    _activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (_activePointers.size === 2 && _pinchState) {
      const pts = [..._activePointers.values()];
      const dx = pts[0].x - pts[1].x;
      const dy = pts[0].y - pts[1].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 0 && _pinchState.startDist > 0) {
        const scale = _pinchState.startDist / dist;
        // Ripristina viewBox iniziale e applica zoom
        zoomVB = Object.assign({}, _pinchState.startVB);
        zoomBy(scale, _pinchState.startCenterClient.x, _pinchState.startCenterClient.y);
      }
    } else if (_activePointers.size === 1 && _panState && e.pointerId === _panState.pointerId) {
      const dx = e.clientX - _panState.startClientX;
      const dy = e.clientY - _panState.startClientY;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
        if (!_panState.moved) {
          _panState.moved = true;
          _isDragging = true;
          svg.classList.add('dragging');
          // Solo ora cattura il pointer per non perderlo se esce dall'svg
          try { svg.setPointerCapture(e.pointerId); } catch(_) {}
        }
      }
      if (_panState.moved) {
        // Converti delta client -> delta viewBox
        const rect = svg.getBoundingClientRect();
        const scaleX = _panState.startVB.w / rect.width;
        const scaleY = _panState.startVB.h / rect.height;
        zoomVB.x = _panState.startVB.x - dx * scaleX;
        zoomVB.y = _panState.startVB.y - dy * scaleY;
        clampZoomVB();
        applyZoomViewBox();
      }
    }
  });

  // PointerUp / cancel
  function endPointer(e) {
    if (_activePointers.has(e.pointerId)) {
      _activePointers.delete(e.pointerId);
    }
    if (_activePointers.size < 2) _pinchState = null;
    if (_activePointers.size === 0) {
      _panState = null;
      // Se ha mosso, allora era un drag: cancella il click
      if (_isDragging) {
        _isDragging = false;
        svg.classList.remove('dragging');
        // Sopprime il click che segue: aggiunge un listener one-shot
        const suppressOnce = (ev) => { ev.stopPropagation(); ev.preventDefault(); };
        svg.addEventListener('click', suppressOnce, { capture: true, once: true });
      }
    }
  }
  svg.addEventListener('pointerup', endPointer);
  svg.addEventListener('pointercancel', endPointer);
  svg.addEventListener('pointerleave', endPointer);

  // Bottoni
  const zi = document.getElementById('zoomInBtn');
  const zo = document.getElementById('zoomOutBtn');
  const zr = document.getElementById('zoomResetBtn');
  if (zi) zi.onclick = () => zoomBy(1/1.25);
  if (zo) zo.onclick = () => zoomBy(1.25);
  if (zr) zr.onclick = () => resetZoom();
}

</script>
<script id="uiScript">
// ============================================================
// FIT ISLAND v2 — UI / MODAL / INTERACTIONS
// ============================================================

var currentModal = null;
var currentModalData = null;
var placingDecorId = null;

// === MODAL OPEN/CLOSE ===
function openModal(type, data) {
  // Se stiamo piazzando una decorazione e si apre un altro modal, annulla
  if (type !== 'decorate') placingDecorId = null;
  currentModal = type;
  currentModalData = data || {};
  document.getElementById('modalOverlay').style.display = 'flex';
  renderModal();
}

function closeAllModals() {
  currentModal = null;
  currentModalData = null;
  document.getElementById('modalOverlay').style.display = 'none';
}

function renderModal() {
  const body = document.getElementById('modalBody');
  if (!body) return;
  switch (currentModal) {
    case 'workout':           body.innerHTML = renderWorkoutModal(); break;
    case 'workoutDetail':     body.innerHTML = renderWorkoutDetailModal(); break;
    case 'buildFromSlot':     body.innerHTML = renderBuildFromSlot(); break;
    case 'buildingDetail':    body.innerHTML = renderBuildingDetail(); break;
    case 'constructionDetail':body.innerHTML = renderConstructionDetail(); break;
    case 'interior':          body.innerHTML = renderInteriorModal(); break;
    case 'decorate':          body.innerHTML = renderDecorateModal(); break;
    case 'decorActions':      body.innerHTML = renderDecorActionsModal(); break;
    case 'quests':            body.innerHTML = renderQuestsModal(); break;
    case 'achievements':      body.innerHTML = renderAchievementsModal(); break;
    case 'population':        body.innerHTML = renderPopulationModal(); break;
    case 'satellites':        body.innerHTML = renderSatellitesModal(); break;
    case 'satelliteUnlock':   body.innerHTML = renderSatelliteUnlockModal(); break;
    case 'unlockSlot':        body.innerHTML = renderUnlockSlotModal(); break;
    case 'more':              body.innerHTML = renderMoreModal(); break;
    case 'stats':             body.innerHTML = renderStatsModal(); break;
    case 'event':             body.innerHTML = renderEventModal(); break;
    case 'intro':             body.innerHTML = renderIntroModal(); break;
    case 'settings':          body.innerHTML = renderSettingsModal(); break;
    case 'helpDiamonds':      body.innerHTML = renderHelpDiamondsModal(); break;
    case 'gemShop':           body.innerHTML = renderGemShopModal(); break;
    default: body.innerHTML = '';
  }
  attachModalListeners();
  // Riapplica listener per <input>/<select> nel modal
  if (currentModal === 'workoutDetail') attachWorkoutDetailInputs();
}

function attachModalListeners() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const action = el.dataset.action;
      handleAction(action, el.dataset);
    };
  });
}

// === HANDLER CENTRALE AZIONI ===
function handleAction(action, data) {
  switch(action) {
    case 'closeModal':      closeAllModals(); break;
    case 'openWorkout':     openModal('workout'); break;
    case 'openWorkoutDetail': openModal('workoutDetail', {workoutId: data.workoutId}); break;
    case 'openQuests':      openModal('quests'); break;
    case 'openAchievements':openModal('achievements'); break;
    case 'openMore':        openModal('more'); break;
    case 'openPopulation':  openModal('population'); break;
    case 'openSatellites':  openModal('satellites'); break;
    case 'openStats':       openModal('stats'); break;
    case 'openEvent':       openModal('event'); break;
    case 'openSettings':    openModal('settings'); break;
    case 'openHelpDiamonds':openModal('helpDiamonds'); break;
    case 'openGemShop':     openModal('gemShop'); break;
    case 'completeWorkoutNow': completeWorkoutFromForm(); break;
    case 'startBuild':      startBuild(data.slotId, data.bId); break;
    case 'startUpgrade':    startUpgrade(data.slotId); break;
    case 'startRestore':    startRestore(data.slotId); break;
    case 'collectBuilding': {
      const amt = collectBuildingStorage(data.slotId);
      if (amt > 0) {
        showToast(`+${amt} 💰`, 'good');
        renderCoinIcons();
        updateUI();
        saveGame();
        if (currentModal === 'buildingDetail') renderModal();
      }
      break;
    }
    case 'demolish':        demolishBuilding(data.slotId); break;
    case 'enterInterior':   openModal('interior', {slotId: data.slotId}); break;
    case 'backFromInterior':openModal('buildingDetail', {slotId: data.slotId}); break;
    case 'startStationUpgrade': startInteriorStationUpgrade(data.slotId, data.stationId); break;
    case 'openDecorate':    openModal('decorate'); break;
    case 'buyDecor':        buyDecor(data.decorId); break;
    case 'startPlacing':    startPlacingDecor(data.decorId); break;
    case 'cancelPlacing':   cancelPlacingDecor(); break;
    case 'expandDecorCap':  expandDecorCap(); break;
    case 'removeDecor':     removeDecoration(data.decorId); break;
    case 'claimAch':        claimAchievement(data.id); break;
    case 'claimQ':          claimDailyQuest(data.id); break;
    case 'unlockSat':       tryUnlockSatellite(data.satId); break;
    case 'unlockSlot':      tryUnlockSlot(data.slotId); break;
    case 'skipConstruction':doSkipConstruction(data.key); break;
    case 'buyGemPack':      buyGemPack(data.packId); break;
    case 'dismissHint':     handleDismissHint(data.id); break;
    case 'introNext':       advanceIntro(); break;
    case 'tutorialDismiss': dismissTutorial(); break;
    case 'reset':           if (confirm('Sei sicuro di voler ricominciare TUTTO da zero?\n\nVerranno cancellati:\n• Nome isola e onboarding\n• Tutti gli edifici e decorazioni\n• Popolazione, statistiche, livello\n• Coins, diamanti, achievement\n• Streak workout e progressi\n\nQuesta azione NON puo essere annullata.')) resetGame(); break;
    case 'debugAdvance':    debugAdvanceDay(); break;
    case 'debugCoins':      state.coins += 10000; updateUI(); saveGame(); break;
    case 'debugGems':       state.gems += 50; updateUI(); saveGame(); break;
    case 'debugMaxStats':   state.stats={vitalita:90,armonia:90,forza:90,comunita:90}; saveGame(); break;
    case 'debugForceBoat':  forceBoatArrival(); break;
    case 'startGame':       startGameFromIntro(); break;
  }
}

// === WORKOUT (v1 style con parametri) ===
function renderWorkoutModal() {
  let html = `<div class="modal-head"><h2>Workout</h2><button class="close-btn" data-action="closeModal">×</button></div>
    <div class="modal-content">
      <p class="muted">Scegli il tipo di allenamento. I diamanti si guadagnano SOLO dai workout!</p>`;
  for (const w of WORKOUT_TYPES) {
    const statIcon = w.statType==='vitalita'?'⚡':w.statType==='forza'?'💪':w.statType==='armonia'?'🧘':'🤝';
    html += `<button class="workout-card" data-action="openWorkoutDetail" data-workout-id="${w.id}">
      <div class="w-icon">${w.icon}</div>
      <div class="w-info">
        <div class="w-name">${w.name}</div>
        <div class="w-meta">${w.desc} ${statIcon}</div>
      </div>
    </button>`;
  }
  html += `</div>`;
  return html;
}

// Stato locale del form workout (per re-render senza perdere valori)
var workoutForm = { duration:null, intensity:'medium', form:85 };

function computeWorkoutRewards(w, durationMin, intensity, formScore) {
  const intDef = INTENSITY_LEVELS[intensity];
  const durRatio = durationMin / w.durataBase;
  const formMult = formScore / 100;
  const streak = streakMultiplier();
  const coins = Math.floor(w.coinsBase * durRatio * intDef.coinsMult * formMult * streak);
  const gems = Math.floor((durationMin / 10) * intDef.gemMult * formMult);
  const xp = Math.floor(w.xpBase * durRatio * intDef.xpMult);
  return { coins, gems, xp, streak };
}

function renderWorkoutDetailModal() {
  const {workoutId} = currentModalData;
  const w = WORKOUT_TYPES.find(x=>x.id===workoutId);
  if (!w) return '';
  if (workoutForm.duration == null) workoutForm.duration = w.durataBase;
  const r = computeWorkoutRewards(w, workoutForm.duration, workoutForm.intensity, workoutForm.form);
  const statIcon = w.statType==='vitalita'?'⚡':w.statType==='forza'?'💪':w.statType==='armonia'?'🧘':'🤝';

  return `<div class="modal-head">
    <h2>${w.icon} ${w.name}</h2>
    <button class="close-btn" data-action="closeModal">×</button>
  </div>
  <div class="modal-content">
    <p class="muted">${w.desc}. Personalizza i parametri per simulare la sessione.</p>

    <div class="param-row">
      <label class="param-label">Durata: <b id="wDurDisplay">${workoutForm.duration} min</b></label>
      <input type="range" id="wDur" min="5" max="120" step="5" value="${workoutForm.duration}" class="slider"/>
    </div>

    <div class="param-row">
      <label class="param-label">Intensita</label>
      <div class="seg-control" id="wIntensity">
        <button class="seg ${workoutForm.intensity==='low'?'active':''}" data-int="low">Bassa</button>
        <button class="seg ${workoutForm.intensity==='medium'?'active':''}" data-int="medium">Media</button>
        <button class="seg ${workoutForm.intensity==='high'?'active':''}" data-int="high">Alta</button>
      </div>
    </div>

    <div class="param-row">
      <label class="param-label">Form score: <b id="wFormDisplay">${workoutForm.form}%</b> <span class="muted small">(AI motion tracking)</span></label>
      <input type="range" id="wForm" min="50" max="100" step="5" value="${workoutForm.form}" class="slider"/>
    </div>

    <div class="reward-preview">
      <div class="reward-row"><span>💰 Coins</span><b id="rewCoins">+${r.coins}</b></div>
      <div class="reward-row"><span>💎 Diamanti</span><b id="rewGems">+${r.gems}</b></div>
      <div class="reward-row"><span>⭐ XP</span><b id="rewXp">+${r.xp}</b></div>
      <div class="reward-row muted small"><span>Streak attivo</span><span id="rewStreak">x${r.streak.toFixed(2)}</span></div>
      <div class="reward-row muted small"><span>${statIcon} Boost stat</span><span id="rewStat">+${w.statType}</span></div>
    </div>

    <button class="primary-btn" data-action="completeWorkoutNow">Completa Workout</button>
    <button class="ghost-btn" data-action="openWorkout">← Cambia tipo</button>
  </div>`;
}

function attachWorkoutDetailInputs() {
  const w = WORKOUT_TYPES.find(x=>x.id===currentModalData.workoutId);
  if (!w) return;
  const refresh = () => {
    const r = computeWorkoutRewards(w, workoutForm.duration, workoutForm.intensity, workoutForm.form);
    const dispDur = document.getElementById('wDurDisplay');
    const dispForm = document.getElementById('wFormDisplay');
    const rc = document.getElementById('rewCoins');
    const rg = document.getElementById('rewGems');
    const rx = document.getElementById('rewXp');
    const rs = document.getElementById('rewStreak');
    if (dispDur) dispDur.textContent = workoutForm.duration + ' min';
    if (dispForm) dispForm.textContent = workoutForm.form + '%';
    if (rc) rc.textContent = '+' + r.coins;
    if (rg) rg.textContent = '+' + r.gems;
    if (rx) rx.textContent = '+' + r.xp;
    if (rs) rs.textContent = 'x' + r.streak.toFixed(2);
  };
  const dur = document.getElementById('wDur');
  if (dur) dur.oninput = (e) => { workoutForm.duration = parseInt(e.target.value); refresh(); };
  const form = document.getElementById('wForm');
  if (form) form.oninput = (e) => { workoutForm.form = parseInt(e.target.value); refresh(); };
  document.querySelectorAll('#wIntensity .seg').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      workoutForm.intensity = btn.dataset.int;
      document.querySelectorAll('#wIntensity .seg').forEach(b => b.classList.toggle('active', b===btn));
      refresh();
    };
  });
}

function completeWorkoutFromForm() {
  const w = WORKOUT_TYPES.find(x=>x.id===currentModalData.workoutId);
  if (!w) return;
  const r = computeWorkoutRewards(w, workoutForm.duration, workoutForm.intensity, workoutForm.form);

  state.coins += r.coins;
  state.gems += r.gems;
  state.totalCoinsEarned += r.coins;
  state.totalGemsEarned += r.gems;
  addXp(r.xp);
  state.totalWorkouts++;
  state.lastWorkoutAt = Date.now();

  applyWorkoutBoost(w, workoutForm.intensity, workoutForm.form, workoutForm.duration);

  const today = getToday();
  if (state.lastWorkoutDate !== today) {
    state.streak++;
    state.lastWorkoutDate = today;
  }
  state.workoutHistory.unshift({date: today, name: w.name, coins: r.coins, gems: r.gems, dur: workoutForm.duration, int: workoutForm.intensity, form: workoutForm.form});
  if (state.workoutHistory.length > 30) state.workoutHistory.pop();

  progressQuest('workout_count', 1);

  // Tutorial
  if (state.tutorialIdx === 2) state.tutorialIdx = 3;

  showToast(`+${r.coins}💰 +${r.gems}💎 +${r.xp}XP`, 'good');
  saveGame();
  updateUI();
  // Reset form per il prossimo
  workoutForm = { duration:null, intensity:'medium', form:85 };
  closeAllModals();
}

// === BUILD ===
function countBuildingInstances(bId) {
  let n = 0;
  for (const slotId in state.placed) if (state.placed[slotId].id === bId) n++;
  return n;
}

function formatDuration(sec) {
  sec = Math.max(0, Math.floor(sec));
  if (sec < 60) return sec + 's';
  const m = Math.floor(sec/60);
  const s = sec % 60;
  if (m < 60) return s > 0 ? `${m}m ${s}s` : `${m}m`;
  const h = Math.floor(m/60);
  const mm = m % 60;
  return mm > 0 ? `${h}h ${mm}m` : `${h}h`;
}

function renderBuildFromSlot() {
  const {slotId, zone} = currentModalData;
  const z = ZONES[zone];
  const candidates = Object.values(BUILDINGS).filter(b => b.zone === zone);
  const cantStart = activeConstructions() >= MAX_CONCURRENT_BUILDS;
  let html = `<div class="modal-head">
    <h2>${z.icon} ${z.name}</h2>
    <button class="close-btn" data-action="closeModal">×</button>
  </div>
  <div class="modal-content">
    <p class="muted">${z.desc}. Scegli un edificio da costruire.</p>
    ${cantStart ? '<div class="warn-banner">⚠️ Max 3 cantieri attivi! Aspetta che ne finisca uno o skippa con 💎.</div>' : ''}`;
  for (const b of candidates) {
    const owned = countBuildingInstances(b.id);
    const adjCost = adjustedCoinCost(b.cost);
    const canCoins = state.coins >= adjCost;
    const can = canCoins && !cantStart;
    const time = buildTimeSeconds(adjCost);
    html += `<button class="build-card${can?'':' disabled'}" ${can?`data-action="startBuild" data-slot-id="${slotId}" data-b-id="${b.id}"`:''}>
      <div class="b-svg"><svg viewBox="-30 -30 60 60" width="48" height="48">${svgBuildingShape(b.icon, b.zone)}</svg></div>
      <div class="b-info">
        <div class="b-name">${b.name}${b.hasInterior?' <span class="badge-interior">interno</span>':''}${owned>0?` <span class="badge-owned">× ${owned}</span>`:''}</div>
        <div class="b-desc">${b.desc}</div>
        <div class="b-stats">
          <span>💰 ${adjCost}</span>
          <span>+${b.rate}/s</span>
          <span>👤 ${b.capacity}</span>
          <span>⏱️ ${formatDuration(time)}</span>
        </div>
      </div>
    </button>`;
  }
  html += `</div>`;
  return html;
}

function startBuild(slotId, bId) {
  const def = BUILDINGS[bId];
  if (!def) return;
  const adjCost = adjustedCoinCost(def.cost);
  if (state.coins < adjCost) { showToast('Coins insufficienti', 'warn'); return; }
  if (activeConstructions() >= MAX_CONCURRENT_BUILDS) { showToast('Max 3 cantieri attivi', 'warn'); return; }
  if (state.construction[slotId]) { showToast('Slot occupato', 'warn'); return; }
  state.coins -= adjCost;
  state.totalCoinsSpent += adjCost;
  const dur = buildTimeSeconds(adjCost);
  startConstruction(slotId, 'build', { bId, targetLevel:1, durationSec:dur });
  progressQuest('spend', adjCost);
  // Tutorial
  if (state.tutorialIdx === 1) state.tutorialIdx = 2;
  showToast(`Cantiere aperto (${formatDuration(dur)})`, 'info');
  saveGame();
  renderStatic();
  updateUI();
  closeAllModals();
}

function renderBuildingDetail() {
  const {slotId} = currentModalData;
  const b = state.placed[slotId];
  if (!b) { closeAllModals(); return ''; }
  const def = BUILDINGS[b.id];
  const nextLevel = b.level + 1;
  const upCost = adjustedCoinCost(Math.floor(def.cost * Math.pow(1.85, b.level)));
  const upTime = upgradeTimeSeconds(upCost, nextLevel);
  const upInProgress = !!state.construction[slotId];
  const canUp = !upInProgress && state.coins >= upCost && b.level < 10 && activeConstructions() < MAX_CONCURRENT_BUILDS;
  const visiting = state.npcRoster.filter(n => n.targetSlot === slotId).length;

  // Neglected check: stesso threshold di core.js (>24h senza upgrade)
  const lastTouched = b.lastUpgradedAt || b.builtAt || 0;
  const isNeglected = lastTouched > 0 && (Date.now() - lastTouched) > 24*3600*1000;
  // Costo ripristino: 50% di un upgrade, durata 40%
  const restoreCost = Math.floor(upCost * 0.5);
  const restoreTime = Math.floor(upTime * 0.4);
  const canRestore = isNeglected && !upInProgress && state.coins >= restoreCost && activeConstructions() < MAX_CONCURRENT_BUILDS;

  let html = `<div class="modal-head">
    <h2>${def.name}</h2>
    <button class="close-btn" data-action="closeModal">×</button>
  </div>
  <div class="modal-content">
    <div class="bd-icon"><svg viewBox="-30 -30 60 60" width="80" height="80">${svgBuildingShape(def.icon, def.zone)}</svg></div>
    <div class="bd-meta">
      <div><span class="muted">Livello</span> <b>${b.level}/10</b></div>
      <div><span class="muted">Produzione</span> <b>+${(def.rate * levelToRateMultiplier(b.level)).toFixed(1)}/s</b></div>
      <div><span class="muted">Capacita abit.</span> <b>${buildingCapacityAtLevel(def.capacity, b.level)}</b></div>
      <div><span class="muted">Visitatori ora</span> <b>${visiting}</b></div>
    </div>
    ${(() => {
      // Storage info se l'edificio produce coins
      if (!def.rate) return '';
      const cap = buildingStorageCap(def, b.level);
      const stored = Math.floor(b.coinStorage || 0);
      const pct = cap > 0 ? Math.min(100, (stored/cap)*100) : 0;
      const isFull = pct >= 99.9;
      return `
        <div class="storage-box">
          <div class="storage-label">
            <span>💰 Deposito</span>
            <span class="storage-amount">${stored} / ${cap}</span>
          </div>
          <div class="storage-bar"><div class="storage-fill ${isFull?'full':''}" style="width:${pct}%"></div></div>
          ${stored > 0 ? `<button class="collect-detail-btn" data-action="collectBuilding" data-slot-id="${slotId}">💰 Raccogli ${stored}</button>` : ''}
          ${isFull ? `<div class="muted small center" style="margin-top:6px">⚠️ Pieno! L'edificio non produce piu finche non raccogli.</div>` : ''}
        </div>`;
    })()}
    ${isNeglected && !upInProgress ? `
      <div class="warn-banner">🏚️ Edificio trascurato! Contribuisce solo al 30% delle stat. Ripristina per riportarlo al massimo o potenzialo.</div>
    ` : ''}
    <div class="bd-stats-box">
      ${Object.entries(def.stats).map(([k,v])=>{
        const ic = k==='vitalita'?'⚡':k==='forza'?'💪':k==='armonia'?'🧘':'🤝';
        return `<span>${ic} ${k}: +${v*b.level}</span>`;
      }).join('')}
    </div>
    ${upInProgress ? (() => {
      const c = state.construction[slotId];
      const left = Math.max(0, c.endAt - Date.now()) / 1000;
      const total = (c.endAt - c.startAt) / 1000;
      const pct = total > 0 ? Math.min(100, (1 - left/total) * 100) : 100;
      const skipCost = skipCostGems(left);
      const canSkip = state.gems >= skipCost;
      const label = c.type === 'restore' ? `🔧 Ripristino in corso` : `⚙️ Upgrade a Lv${c.targetLevel}`;
      return `
        <div class="construction-progress">
          <div class="cp-bar"><div class="cp-fill" style="width:${pct}%"></div></div>
          <div class="cp-time">${label}: ⏱️ ${formatDuration(left)} rimanenti</div>
        </div>
        <button class="primary-btn ${canSkip?'':'disabled'}" ${canSkip?`data-action="skipConstruction" data-key="${slotId}"`:''}>
          ⚡ Salta per 💎 ${skipCost}
        </button>`;
    })() : `
      ${isNeglected ? `
        <button class="restore-btn${canRestore?'':' disabled'}" ${canRestore?`data-action="startRestore" data-slot-id="${slotId}"`:''}>
          🔧 Ripristina — 💰 ${restoreCost} • ⏱️ ${formatDuration(restoreTime)}
        </button>` : ''}
      ${b.level < 10 ? `
        <button class="primary-btn${canUp?'':' disabled'}" ${canUp?`data-action="startUpgrade" data-slot-id="${slotId}"`:''}>
          Potenzia a Lv${nextLevel} — 💰 ${upCost} • ⏱️ ${formatDuration(upTime)}
        </button>` : '<div class="muted center">Livello massimo raggiunto</div>'}
    `}
    ${def.hasInterior ? `
      <button class="secondary-btn" data-action="enterInterior" data-slot-id="${slotId}">
        🏠 Entra all'interno
      </button>` : ''}
    <button class="ghost-btn" data-action="demolish" data-slot-id="${slotId}">Demolisci</button>
  </div>`;
  return html;
}

function startUpgrade(slotId) {
  const b = state.placed[slotId];
  if (!b || b.level >= 10) return;
  const def = BUILDINGS[b.id];
  const nextLevel = b.level + 1;
  const cost = adjustedCoinCost(Math.floor(def.cost * Math.pow(1.85, b.level)));
  if (state.coins < cost) { showToast('Coins insufficienti', 'warn'); return; }
  if (activeConstructions() >= MAX_CONCURRENT_BUILDS) { showToast('Max 3 cantieri attivi', 'warn'); return; }
  if (state.construction[slotId]) { showToast('Gia in corso', 'warn'); return; }
  state.coins -= cost;
  state.totalCoinsSpent += cost;
  const dur = upgradeTimeSeconds(cost, nextLevel);
  startConstruction(slotId, 'upgrade', { targetLevel:nextLevel, durationSec:dur });
  progressQuest('spend', cost);
  if (state.tutorialIdx === 4) state.tutorialIdx = 5;
  showToast(`Upgrade avviato (${formatDuration(dur)})`, 'info');
  saveGame();
  renderStatic();
  updateUI();
  closeAllModals();
}

function startRestore(slotId) {
  const b = state.placed[slotId];
  if (!b) return;
  const def = BUILDINGS[b.id];
  // Costo: 50% di un upgrade, durata 40%
  const upCost = adjustedCoinCost(Math.floor(def.cost * Math.pow(1.85, b.level)));
  const cost = Math.floor(upCost * 0.5);
  const dur = Math.floor(upgradeTimeSeconds(upCost, b.level + 1) * 0.4);
  // Verifica trascurato
  const lastTouched = b.lastUpgradedAt || b.builtAt || 0;
  const isNeglected = lastTouched > 0 && (Date.now() - lastTouched) > 24*3600*1000;
  if (!isNeglected) { showToast('Edificio gia in salute', 'warn'); return; }
  if (state.coins < cost) { showToast('Coins insufficienti', 'warn'); return; }
  if (activeConstructions() >= MAX_CONCURRENT_BUILDS) { showToast('Max 3 cantieri attivi', 'warn'); return; }
  if (state.construction[slotId]) { showToast('Gia in corso', 'warn'); return; }
  state.coins -= cost;
  state.totalCoinsSpent += cost;
  startConstruction(slotId, 'restore', { durationSec: dur });
  progressQuest('spend', cost);
  showToast(`Ripristino avviato (${formatDuration(dur)})`, 'info');
  saveGame();
  renderStatic();
  updateUI();
  closeAllModals();
}

function demolishBuilding(slotId) {
  const b = state.placed[slotId];
  if (!b) return;
  const def = BUILDINGS[b.id];
  if (!confirm(`Demolire ${def.name}? Recupererai il 50% del costo.`)) return;
  const refund = Math.floor(adjustedCoinCost(def.cost) * 0.5);
  state.coins += refund;
  delete state.placed[slotId];
  showToast(`+${refund} 💰 rimborso`, 'good');
  saveGame();
  renderStatic();
  updateUI();
  closeAllModals();
}

// === INTERIOR ===
function renderInteriorModal() {
  const {slotId} = currentModalData;
  const b = state.placed[slotId];
  if (!b) { closeAllModals(); return ''; }
  const def = BUILDINGS[b.id];
  const interior = INTERIORS[b.id];
  if (!interior) { return '<div class="modal-head"><h2>Niente da vedere</h2></div>'; }

  // Tracking visite
  if (!state.visitedInteriors.includes(b.id)) {
    state.visitedInteriors.push(b.id);
    saveGame();
  }

  // Calcola NPC che visitano questo edificio
  const visitingNpcs = state.npcRoster.filter(n => n.targetSlot === slotId && n.state === 'visiting');

  let html = `<div class="modal-head">
    <h2>${def.name} — Interno</h2>
    <button class="close-btn" data-action="closeModal">×</button>
  </div>
  <div class="modal-content interior-modal">`;

  // Vista interna SVG
  html += `<div class="interior-view">
    <svg viewBox="0 0 700 460" style="width:100%;height:auto;background:${interior.bgColor};border-radius:12px">
      <rect x="0" y="350" width="700" height="110" fill="${interior.floorColor}"/>
      <rect x="0" y="0" width="700" height="350" fill="${interior.bgColor}"/>`;

  // Elementi statici interni
  for (const el of interior.elements) {
    html += renderInteriorElement(el);
  }

  // NPC nei spot
  for (let i=0;i<interior.npcSpots.length && i<visitingNpcs.length;i++) {
    const spot = interior.npcSpots[i];
    const npc = visitingNpcs[i];
    const tdef = NPC_TYPES[npc.type];
    html += `<g transform="translate(${spot.x},${spot.y})">
      <ellipse cx="0" cy="36" rx="8" ry="3" fill="rgba(0,0,0,0.18)"/>
      <rect x="-10" y="0" width="20" height="22" rx="3" fill="${tdef.color}"/>
      <circle cx="0" cy="-6" r="9" fill="#f4d4a8"/>
      <rect x="-7" y="22" width="5" height="10" fill="#3d2810"/>
      <rect x="2" y="22" width="5" height="10" fill="#3d2810"/>
    </g>`;
  }

  if (interior.isPanorama) {
    // Vista panoramica speciale per faro: mostra mini mappa
    html += `<text x="350" y="180" text-anchor="middle" font-size="22" fill="#9e4828" font-family="Fraunces" font-weight="700">Vista dal Faro</text>
      <text x="350" y="210" text-anchor="middle" font-size="14" fill="#7d6850">Popolazione: ${state.population} • Edifici: ${Object.keys(state.placed).length}</text>`;
  }

  html += `</svg></div>`;

  html += `<div class="interior-info">
    <span>👤 ${visitingNpcs.length} visitatori ora</span>
    <span>💰 +${(def.rate * levelToRateMultiplier(b.level)).toFixed(1)}/s</span>
  </div>`;

  // STAZIONI INTERNE A LIVELLI
  const stations = INTERIOR_STATIONS[b.id] || [];
  html += `<h3 class="section-title">Stazioni Interne</h3>
    <p class="muted small">Cap stazione = livello edificio (Lv${b.level}). Potenzia l'edificio per sbloccare livelli stazione piu alti.</p>`;
  for (const st of stations) {
    const curLvl = (b.interiorStations && b.interiorStations[st.id]) || 0;
    const maxLvl = Math.min(5, b.level);
    const atMaxForBuilding = curLvl >= maxLvl;
    const inProgress = !!state.construction[slotId + '@' + st.id];
    const nextLvl = curLvl + 1;
    const nextCost = curLvl < 5 ? adjustedCoinCost(interiorStationCost(st.baseCost, nextLvl)) : 0;
    const nextTime = curLvl < 5 ? interiorUpgradeTimeSeconds(nextCost) : 0;
    const canBuy = !inProgress && !atMaxForBuilding && curLvl < 5 && state.coins >= nextCost && activeConstructions() < MAX_CONCURRENT_BUILDS;
    html += `<div class="upgrade-card ${curLvl>0?'applied':''}">
      <div class="up-info">
        <div class="up-name">${st.name} <span class="muted small">Lv ${curLvl}/5</span></div>
        <div class="up-desc">${st.desc}</div>
      </div>
      ${inProgress
        ? (() => {
            const key = slotId + '@' + st.id;
            const c = state.construction[key];
            const left = Math.max(0, c.endAt - Date.now()) / 1000;
            const skipCost = skipCostGems(left);
            const canSkip = state.gems >= skipCost;
            return `<button class="primary-btn small ${canSkip?'':'disabled'}" ${canSkip?`data-action="skipConstruction" data-key="${key}"`:''}>
              ⚡${formatDuration(left)} • 💎${skipCost}
            </button>`;
          })()
        : curLvl >= 5
          ? '<span class="up-applied">MAX ✓</span>'
          : atMaxForBuilding
            ? `<span class="up-applied muted">Cap Lv${maxLvl}</span>`
            : `<button class="primary-btn small${canBuy?'':' disabled'}" ${canBuy?`data-action="startStationUpgrade" data-slot-id="${slotId}" data-station-id="${st.id}"`:''}>
                Lv${nextLvl} • 💰${nextCost} • ⏱️${formatDuration(nextTime)}
              </button>`
      }
    </div>`;
  }

  html += `<button class="secondary-btn" data-action="backFromInterior" data-slot-id="${slotId}">← Indietro</button>`;
  html += `</div>`;
  return html;
}

function startInteriorStationUpgrade(slotId, stationId) {
  const b = state.placed[slotId];
  if (!b) return;
  const defs = INTERIOR_STATIONS[b.id];
  if (!defs) return;
  const st = defs.find(s=>s.id===stationId);
  if (!st) return;
  const curLvl = (b.interiorStations && b.interiorStations[stationId]) || 0;
  if (curLvl >= 5) return;
  if (curLvl >= b.level) { showToast(`Serve edificio Lv${curLvl+1}`, 'warn'); return; }
  if (activeConstructions() >= MAX_CONCURRENT_BUILDS) { showToast('Max 3 cantieri attivi', 'warn'); return; }
  const targetLvl = curLvl + 1;
  const cost = adjustedCoinCost(interiorStationCost(st.baseCost, targetLvl));
  if (state.coins < cost) { showToast('Coins insufficienti', 'warn'); return; }
  const key = slotId + '@' + stationId;
  if (state.construction[key]) { showToast('Gia in corso', 'warn'); return; }
  state.coins -= cost;
  state.totalCoinsSpent += cost;
  const dur = interiorUpgradeTimeSeconds(cost);
  startConstruction(slotId, 'interior', { stationId, targetLevel:targetLvl, durationSec:dur });
  progressQuest('spend', cost);
  showToast(`${st.name} avviato (${formatDuration(dur)})`, 'info');
  saveGame();
  updateUI();
  renderModal();
}

// === DECORAZIONI (piazzamento libero) ===
function decorCap() {
  return DECOR_CAP_BASE + (state.decorCapBonus || 0);
}

function renderDecorateModal() {
  const placed = Array.isArray(state.decorPlaced) ? state.decorPlaced.length : 0;
  const cap = decorCap();
  const canExpand = state.decorCapBonus < (DECOR_CAP_EXPANDED - DECOR_CAP_BASE) && state.gems >= DECOR_CAP_UPGRADE_GEM_COST;
  let html = `<div class="modal-head">
    <h2>Decorazioni</h2>
    <button class="close-btn" data-action="closeModal">×</button>
  </div>
  <div class="modal-content">
    <div class="decor-cap-info">
      <span>Piazzate: <b>${placed}/${cap}</b></span>
      ${state.decorCapBonus === 0
        ? `<button class="primary-btn small${canExpand?'':' disabled'}" ${canExpand?'data-action="expandDecorCap"':''}>Espandi a ${DECOR_CAP_EXPANDED} • 💎${DECOR_CAP_UPGRADE_GEM_COST}</button>`
        : '<span class="claimed-tag">MAX ✓</span>'}
    </div>
    <p class="muted small">Compra le decorazioni e tocca "Piazza". Poi tocca un punto qualsiasi dell'isola per posizionarle.</p>`;

  for (const d of Object.values(DECORATIONS)) {
    const owned = state.decorInventory[d.id] || 0;
    const totalBought = (state.decorTotalBought && state.decorTotalBought[d.id]) || 0;
    const adjCost = decorCurrentPrice(d.id);
    const can = state.coins >= adjCost;
    const nextCost = Math.floor(d.cost * coinCostMultiplier() * Math.pow(2, totalBought + 1));
    html += `<div class="decor-card">
      <div class="d-svg"><svg viewBox="-20 -28 40 36" width="48" height="48">${svgDecoration(d.id)}</svg></div>
      <div class="d-info">
        <div class="d-name">${d.name}${totalBought>0?` <span class="badge-owned">${totalBought} acquistate</span>`:''}</div>
        <div class="d-desc">+${d.happiness} felicita</div>
        <div class="d-owned">In magazzino: ${owned}${totalBought>0?` • Prossima: 💰${nextCost}`:''}</div>
      </div>
      <div class="d-actions">
        <button class="primary-btn small${can?'':' disabled'}" ${can?`data-action="buyDecor" data-decor-id="${d.id}"`:''}>💰 ${adjCost}</button>
        ${owned > 0 ? `<button class="secondary-btn small" data-action="startPlacing" data-decor-id="${d.id}">Piazza (${owned})</button>` : ''}
      </div>
    </div>`;
  }
  html += `</div>`;
  return html;
}

function expandDecorCap() {
  if (state.decorCapBonus >= (DECOR_CAP_EXPANDED - DECOR_CAP_BASE)) return;
  if (state.gems < DECOR_CAP_UPGRADE_GEM_COST) { showToast('Gemme insufficienti', 'warn'); return; }
  state.gems -= DECOR_CAP_UPGRADE_GEM_COST;
  state.totalGemsSpent += DECOR_CAP_UPGRADE_GEM_COST;
  state.decorCapBonus = DECOR_CAP_EXPANDED - DECOR_CAP_BASE;
  showToast(`Capacita decorazioni: ${DECOR_CAP_EXPANDED}!`, 'good');
  saveGame();
  updateUI();
  renderModal();
}

function buyDecor(decorId) {
  const d = DECORATIONS[decorId];
  if (!d) return;
  const adjCost = decorCurrentPrice(decorId);
  if (state.coins < adjCost) { showToast('Coins insufficienti', 'warn'); return; }
  state.coins -= adjCost;
  state.totalCoinsSpent += adjCost;
  state.decorInventory[decorId] = (state.decorInventory[decorId] || 0) + 1;
  state.decorTotalBought = state.decorTotalBought || {};
  state.decorTotalBought[decorId] = (state.decorTotalBought[decorId] || 0) + 1;
  progressQuest('spend', adjCost);
  showToast(`${d.name} nel magazzino (prossima costera di piu)`, 'good');
  saveGame();
  updateUI();
  renderModal();
}

function startPlacingDecor(decorId) {
  if (!state.decorInventory[decorId] || state.decorInventory[decorId] <= 0) {
    showToast('Magazzino vuoto', 'warn'); return;
  }
  // Verifica cap
  const placed = Array.isArray(state.decorPlaced) ? state.decorPlaced.length : 0;
  if (placed >= decorCap()) {
    showToast(`Limite raggiunto (${decorCap()}). Rimuovi qualcosa o espandi.`, 'warn');
    return;
  }
  placingDecorId = decorId;
  closeAllModals();
  showPlacementBar();
  renderEntities();
}

// Piazzamento LIBERO: chiamata con coordinate viewBox dell'SVG
function placeDecorationAt(x, y) {
  if (!placingDecorId) return;
  if (!state.decorInventory[placingDecorId] || state.decorInventory[placingDecorId] <= 0) {
    cancelPlacingDecor();
    return;
  }
  // Verifica zona valida: solo dentro l'isola principale o satellite sbloccata
  // Test approssimativo: isola principale = ellisse cx=450 cy=400 rx=430 ry=330
  const inMain = ((x-450)*(x-450))/(430*430) + ((y-400)*(y-400))/(330*330) <= 1;
  let inSatellite = false;
  for (const sId of state.unlockedSatellites) {
    const sat = SATELLITE_ISLANDS[sId];
    // Approssimazione: ellisse 130x100 centrata su sat.centerX/Y
    const dx = x - sat.centerX, dy = y - sat.centerY;
    if ((dx*dx)/(140*140) + (dy*dy)/(110*110) <= 1) { inSatellite = true; break; }
  }
  if (!inMain && !inSatellite) {
    showToast('Devi piazzare sull\'isola, non in mare', 'warn');
    return;
  }
  // Verifica cap
  if (state.decorPlaced.length >= decorCap()) {
    showToast(`Limite ${decorCap()} raggiunto`, 'warn');
    cancelPlacingDecor();
    return;
  }
  const newId = 'd_' + Date.now() + '_' + Math.floor(Math.random()*9999);
  state.decorPlaced.push({ id: newId, decorId: placingDecorId, x, y, placedAt: Date.now() });
  state.decorInventory[placingDecorId]--;
  progressQuest('decor_count', 1);
  const d = DECORATIONS[placingDecorId];
  showToast(`${d.name} piazzata!`, 'good');
  saveGame();
  renderStatic();
  if (state.decorInventory[placingDecorId] > 0) {
    updatePlacementBar();
  } else {
    cancelPlacingDecor();
  }
}

function cancelPlacingDecor() {
  placingDecorId = null;
  hidePlacementBar();
  renderEntities();
}

function showPlacementBar() {
  const bar = document.getElementById('placementBar');
  if (!bar) return;
  bar.style.display = 'flex';
  updatePlacementBar();
}
function hidePlacementBar() {
  const bar = document.getElementById('placementBar');
  if (bar) bar.style.display = 'none';
}
function updatePlacementBar() {
  if (!placingDecorId) return;
  const d = DECORATIONS[placingDecorId];
  const owned = state.decorInventory[placingDecorId] || 0;
  const el = document.getElementById('placementText');
  if (el) el.textContent = `Tocca l'isola per piazzare ${d.name} (${owned} restanti)`;
}

// Modal "azioni su decorazione piazzata"
function renderDecorActionsModal() {
  const {decorId} = currentModalData;
  const d = Array.isArray(state.decorPlaced) ? state.decorPlaced.find(x=>x.id===decorId) : null;
  if (!d) { closeAllModals(); return ''; }
  const def = DECORATIONS[d.decorId];
  return `<div class="modal-head">
    <h2>${def.name}</h2>
    <button class="close-btn" data-action="closeModal">×</button>
  </div>
  <div class="modal-content">
    <div class="d-svg-big"><svg viewBox="-20 -30 40 40" width="80" height="80">${svgDecoration(d.decorId)}</svg></div>
    <p class="muted center">+${def.happiness} felicita all'isola</p>
    <button class="secondary-btn" data-action="removeDecor" data-decor-id="${d.id}">Rimuovi (rimborso 50%)</button>
    <button class="ghost-btn" data-action="closeModal">Chiudi</button>
  </div>`;
}

function removeDecoration(decorId) {
  if (!Array.isArray(state.decorPlaced)) return;
  const idx = state.decorPlaced.findIndex(x=>x.id===decorId);
  if (idx < 0) return;
  const d = state.decorPlaced[idx];
  const def = DECORATIONS[d.decorId];
  const refund = Math.floor(adjustedCoinCost(def.cost || 0) * 0.5);
  state.decorPlaced.splice(idx, 1);
  // Decrementa il contatore acquisti progressivi per ribassare il prezzo della prossima
  if (state.decorTotalBought && state.decorTotalBought[d.decorId] > 0) {
    state.decorTotalBought[d.decorId]--;
  }
  state.coins += refund;
  state.totalCoinsEarned += refund;
  showToast(`Rimossa. +${refund}💰`, 'info');
  saveGame();
  renderStatic();
  updateUI();
  closeAllModals();
}

function renderPopulationModal() {
  const {capacity} = computeBuildingStats();
  const avgStat = (state.stats.vitalita + state.stats.armonia + state.stats.forza + state.stats.comunita) / 4;
  let trend = '→';
  if (avgStat >= 70) trend = '↑↑ Boom';
  else if (avgStat >= 50) trend = '↑ Crescita';
  else if (avgStat >= 40) trend = '→ Stabile';
  else if (avgStat >= 25) trend = '↓ Calo';
  else trend = '↓↓ Emigrazione';

  // Conteggio per tipo NPC visibili
  const byType = {};
  for (const n of state.npcRoster) byType[n.type] = (byType[n.type]||0) + 1;

  let html = `<div class="modal-head">
    <h2>Popolazione</h2>
    <button class="close-btn" data-action="closeModal">×</button>
  </div>
  <div class="modal-content">
    <div class="pop-overview">
      <div class="pop-big">${state.population}<span class="muted">/${Math.floor(capacity)}</span></div>
      <div class="pop-trend">${trend}</div>
    </div>
    <p class="muted small">Le statistiche sotto influenzano quanto la tua isola attrae e trattiene abitanti. Tieni la media sopra 40 per non perdere gente, sopra 70 per il boom.</p>

    <h3 class="section-title">Statistiche dell'Isola</h3>`;

  html += statBar('⚡ Vitalità', state.stats.vitalita, '#c8643c', 'Energia dell\'isola. Sale con cardio e workout.');
  html += statBar('🧘 Armonia', state.stats.armonia, '#9bb88a', 'Equilibrio. Sale con yoga, spa, decorazioni.');
  html += statBar('💪 Forza Collettiva', state.stats.forza, '#9e4828', 'Fitness fisica. Determina capacità max.');
  html += statBar('🤝 Comunità', state.stats.comunita, '#d9a86a', 'Coesione sociale. Influenza produzione coins.');

  html += `<h3 class="section-title">Abitanti Visibili</h3>

      <span class="arch-name">${tdef.icon} ${tdef.name}</span>
      <span class="arch-count">${count}</span>

  }
  html += `</div></div>`;
  return html;
}

function tryUnlockSatellite(satId) {
  const sat = SATELLITE_ISLANDS[satId];
  if (!sat) return;
  if (state.unlockedSatellites.includes(satId)) return;
  if (state.level < sat.unlockLevel) { showToast(`Serve liv ${sat.unlockLevel}`, 'warn'); return; }
  const adjCoins = adjustedCoinCost(sat.costCoins);
  if (sat.costCoins > 0 && state.coins < adjCoins) { showToast('Coins insufficienti', 'warn'); return; }
  if (sat.costGems > 0 && state.gems < sat.costGems) { showToast('Gemme insufficienti', 'warn'); return; }
  state.coins -= adjCoins;
  state.gems -= sat.costGems;
  state.totalCoinsSpent += adjCoins;
  state.unlockedSatellites.push(satId);
  showToast(`${sat.name} sbloccata! 🎉`, 'good');
  addXp(50);
  saveGame();
  renderStatic();
  updateUI();
  closeAllModals();
}

function debugAdvanceDay() {
  state.lastDailyReset = 'never';
  state.lastWorkoutDate = null;
  // Simula 25h trascorse senza workout e senza upgrade:
  // tutte le stat soffriranno per inattivita workout (>24h) e mancato upgrade (>30min)
  const past25h = Date.now() - 25 * 3600 * 1000;
  state.lastWorkoutAt = past25h;
  for (const slotId in state.placed) {
    const b = state.placed[slotId];
    // Mantieni builtAt originale ma anticipa lastUpgradedAt cosi triggera il malus "no upgrade da >30min"
    // E anche il malus "edificio trascurato" (>24h senza upgrade)
    b.lastUpgradedAt = past25h;
  }
  // Anche reset del cooldown emigrazione cosi se sovraffollato emigra subito
  state._lastForcedEmigration = past25h;
  checkDailyReset();
  // Simula 60 secondi di decay con TUTTI i malus attivi.
  // Con malus pieni il decay e' ~1/s sulla vitalita: stat da 80 scende a ~20.
  // Tempi piu lunghi azzererebbero tutto.
  updateStats(60);
  saveGame();
  updateUI();
  showToast('+25h simulate. Stat in calo per inattivita.', 'warn');
  closeAllModals();
}

function renderConstructionDetail() {
  const {slotId} = currentModalData;
  // Trova la costruzione: slotId o slotId@station
  let key = slotId;
  let c = state.construction[key];
  if (!c) {
    // Cerca con @
    for (const k in state.construction) {
      if (k.split('@')[0] === slotId) { key = k; c = state.construction[k]; break; }
    }
  }
  if (!c) { closeAllModals(); return ''; }
  const left = Math.max(0, c.endAt - Date.now()) / 1000;
  const total = (c.endAt - c.startAt) / 1000;
  const pct = total > 0 ? Math.min(100, (1 - left/total) * 100) : 100;
  let title = 'Cantiere';
  if (c.type === 'build') title = `Costruzione: ${BUILDINGS[c.bId].name}`;
  if (c.type === 'upgrade') title = `Upgrade a Lv${c.targetLevel}`;
  if (c.type === 'interior') {
    const b = state.placed[c.slotId];
    const defs = b ? INTERIOR_STATIONS[b.id] : null;
    const st = defs ? defs.find(s=>s.id===c.stationId) : null;
    title = `${st ? st.name : 'Stazione'} -> Lv${c.targetLevel}`;
  }
  const skipCost = skipCostGems(left);
  return `<div class="modal-head">
    <h2>🚧 ${title}</h2>
    <button class="close-btn" data-action="closeModal">×</button>
  </div>
  <div class="modal-content">
    <div class="construction-progress">
      <div class="cp-bar"><div class="cp-fill" style="width:${pct}%"></div></div>
      <div class="cp-time">⏱️ ${formatDuration(left)} rimanenti</div>
    </div>
    <button class="primary-btn ${state.gems >= skipCost ? '' : 'disabled'}" ${state.gems >= skipCost ? `data-action="skipConstruction" data-key="${key}"` : ''}>
      ⚡ Salta per 💎 ${skipCost}
    </button>
    <p class="muted small center">Hai ${state.gems} 💎 (i diamanti si guadagnano dai workout)</p>
  </div>`;
}

function doSkipConstruction(key) {
  if (skipConstruction(key)) {
    saveGame();
    // Il loop li processera ma forziamo subito
    processCompletedConstructions();
    renderStatic();
    updateUI();
    closeAllModals();
  }
}

  </div>
  <div class="modal-content">
    <p class="muted">Converti i tuoi diamanti in coins. Hai ${state.gems} 💎.</p>`;
  for (const pack of GEM_SHOP) {
    const can = state.gems >= pack.gems;
    html += `<div class="gem-pack">
      <div class="gp-info">
        <div class="gp-name">${pack.label}</div>
        <div class="gp-detail">💎 ${pack.gems} → 💰 ${pack.coins}</div>
      </div>
      <button class="primary-btn small${can?'':' disabled'}" ${can?`data-action="buyGemPack" data-pack-id="${pack.id}"`:''}>Compra</button>
    </div>`;
  }
  html += `</div>`;
  return html;
}

function buyGemPack(packId) {
  const pack = GEM_SHOP.find(p=>p.id===packId);
  if (!pack) return;
  if (state.gems < pack.gems) { showToast('Gemme insufficienti', 'warn'); return; }
  state.gems -= pack.gems;
  state.coins += pack.coins;
  state.totalGemsSpent += pack.gems;
  state.totalCoinsEarned += pack.coins;
  showToast(`-${pack.gems}💎 +${pack.coins}💰`, 'good');
  saveGame();
  updateUI();
  renderModal();
}

// === HINTS ===
var currentHint = null;
function handleHintCheck() {
  const h = maybeShowHint();
  if (h) {
    currentHint = h;
    showHintBanner(h);
  }
}
function showHintBanner(h) {
  const banner = document.getElementById('hintBanner');
  if (!banner) return;
  banner.style.display = 'flex';
  const text = document.getElementById('hintText');
  if (text) text.textContent = h.text;
  banner.dataset.hintId = h.id;
}
function hideHintBanner() {
  const banner = document.getElementById('hintBanner');
  if (banner) banner.style.display = 'none';
  currentHint = null;
}
function handleDismissHint(id) {
  if (id) dismissHint(id);
  hideHintBanner();
  saveGame();
}

// === TUTORIAL ===
function dismissTutorial() {
  state.tutorialIdx = 99; // skip all
  hideTutorialBanner();
  saveGame();
}
function showTutorialBanner() {
  const banner = document.getElementById('tutorialBanner');
  if (!banner) return;
  if (!state.tutorialIdx || state.tutorialIdx <= 0 || state.tutorialIdx >= TUTORIAL_STEPS.length-1) {
    banner.style.display = 'none';
    return;
  }
  const step = TUTORIAL_STEPS[state.tutorialIdx];
  if (!step || !step.text) {
    banner.style.display = 'none';
    return;
  }
  banner.style.display = 'flex';
  const text = document.getElementById('tutorialText');
  if (text) text.textContent = step.text;
}
function hideTutorialBanner() {
  const banner = document.getElementById('tutorialBanner');
  if (banner) banner.style.display = 'none';
}

// === TOAST ===
var toastQueue = [];
function showToast(text, kind) {
  const c = document.getElementById('toastContainer');
  if (!c) return;
  const t = document.createElement('div');
  t.className = 'toast toast-' + (kind||'info');
  t.textContent = text;
  c.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 400);
  }, 2500);
}

// === UI TOP BAR / NAV UPDATE ===
var lastUiUpdate = 0;
var lastTutorialIdxShown = -1;
function updateUI() {
  // I badge nav non sono throttlati: devono aggiornarsi SUBITO dopo un claim
  updateNavBadges();
  const now = Date.now();
  if (now - lastUiUpdate < 100) return;
  lastUiUpdate = now;
  document.getElementById('coinsText').textContent = formatNumber(state.coins);
  document.getElementById('gemsText').textContent = formatNumber(state.gems);
  document.getElementById('levelText').textContent = 'Lv' + state.level;
  document.getElementById('xpBarFill').style.width = ((state.xp / xpForLevel(state.level)) * 100) + '%';
  document.getElementById('popText').textContent = `👥 ${state.population}`;
  document.getElementById('streakText').textContent = state.streak > 0 ? `🔥${state.streak}` : '';
  const idle = computeIdleRate();
  document.getElementById('rateText').textContent = `+${idle.toFixed(1)}/s`;
  const avg = (state.stats.vitalita+state.stats.armonia+state.stats.forza+state.stats.comunita)/4;
  let mood = '😊';
  if (avg < 25) mood = '😟';
  else if (avg < 40) mood = '😐';
  else if (avg < 70) mood = '🙂';
  else mood = '🤩';
  document.getElementById('moodText').textContent = mood;
  // Bottone "Raccogli tutto": visibile se c'e almeno qualche storage attivo
  const pending = totalPendingCoins();
  const collectBtn = document.getElementById('collectAllBtn');
  if (collectBtn) {
    if (pending >= 1) {
      collectBtn.style.display = 'inline-block';
      const txt = document.getElementById('collectAllText');
      const flooredP = Math.floor(pending);
      if (txt) txt.textContent = flooredP >= 1000 ? `${(flooredP/1000).toFixed(1)}K` : String(flooredP);
      // Pulsa se almeno un edificio e' pieno
      const anyFull = (() => {
        for (const sId in state.placed) {
          const b = state.placed[sId];
          const def = BUILDINGS[b.id];
          if (!def || !def.rate) continue;
          const cap = buildingStorageCap(def, b.level || 1);
          if (cap > 0 && (b.coinStorage || 0) >= cap * 0.999) return true;
        }
        return false;
      })();
      collectBtn.classList.toggle('has-full', anyFull);
    } else {
      collectBtn.style.display = 'none';
    }
  }
  // Tutorial banner refresh quando cambia step
  if (state.tutorialIdx !== lastTutorialIdxShown) {
    lastTutorialIdxShown = state.tutorialIdx;
    showTutorialBanner();
  }
}

function updateNavBadges() {
  // Quest ritirabili
  let questCount = 0;
  if (Array.isArray(state.dailyQuests)) {
    for (const q of state.dailyQuests) {
      if (!q.claimed && q.progress >= q.target) questCount++;
    }
  }
  // Obiettivi ritirabili: one-shot non claimati + tier ricorrenti pronti
  let achCount = 0;
  for (const a of ACHIEVEMENTS) {
    if (!state.achievementsClaimed.includes(a.id) && a.condition(state)) achCount++;
  }
  const tiers = getActiveTierAchievements();
  for (const t of tiers) {
    if (t.condition()) achCount++;
  }
  const setBadge = (id, n) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (n > 0) {
      el.textContent = n > 9 ? '9+' : String(n);
      el.classList.add('show');
    } else {
      el.classList.remove('show');
      el.textContent = '';
    }
  };
  setBadge('badgeQuests', questCount);
  setBadge('badgeAch', achCount);
}

// === BOOT ===
function boot() {
  loadGame();
  checkStreak();
  checkDailyReset();
  initEvent();
  if (!state.boat) scheduleBoat();

  if (!state.onboardingDone) {
    openModal('intro');
  }

  const offline = applyOfflineProgress();
  if (offline > 0) {
    setTimeout(() => showToast(`Offline: +${formatNumber(offline)} 💰`, 'good'), 800);
  }

  renderStatic();
  updateUI();
  checkAchievements();
  showTutorialBanner();

  lastFrameTime = performance.now();
  lastPopUpdate = performance.now();
  requestAnimationFrame(gameLoop);

  // Listener globali
  document.getElementById('modalOverlay').onclick = (e) => {
    if (e.target.id === 'modalOverlay') closeAllModals();
  };

  // Bottom nav
  document.getElementById('navWorkout').onclick = () => openModal('workout');
  document.getElementById('navQuests').onclick = () => openModal('quests');
  document.getElementById('navAch').onclick = () => openModal('achievements');
  document.getElementById('navMore').onclick = () => openModal('more');

  // Placement cancel
  document.getElementById('cancelPlacementBtn').onclick = () => cancelPlacingDecor();

  // Bottone "Raccogli tutto"
  const collectBtn = document.getElementById('collectAllBtn');
  if (collectBtn) collectBtn.onclick = () => {
    const amt = collectAllBuildingStorage();
    if (amt > 0) {
      showToast(`+${amt} 💰 raccolti`, 'good');
      renderCoinIcons();
      updateUI();
      saveGame();
    }
  };

  // Hint banner close
  const hintClose = document.getElementById('hintCloseBtn');
  if (hintClose) hintClose.onclick = () => {
    const banner = document.getElementById('hintBanner');
    handleDismissHint(banner && banner.dataset.hintId);
  };

  // Tutorial banner close
  const tutClose = document.getElementById('tutorialCloseBtn');
  if (tutClose) tutClose.onclick = () => dismissTutorial();

  // Zoom & pan gestures
  initZoomGestures();
}

window.addEventListener('DOMContentLoaded', boot);

</script>
